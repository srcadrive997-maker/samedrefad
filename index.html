<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=samed.html">
<title>صامد — SAMED</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:linear-gradient(135deg,#0e1420 0%,#1a3c61 60%,#0f2540 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI','Calibri',sans-serif;color:#fff;}
  .wrap{text-align:center;padding:40px;}
  .logo{font-size:5rem;font-weight:900;color:#fff;line-height:1;text-shadow:2px 2px 0 #1a3c61,4px 4px 12px rgba(0,0,0,.4);}
  .logo-en{font-size:2rem;font-weight:900;color:#90cdf4;letter-spacing:4px;margin-top:8px;}
  .sub{font-size:1rem;color:#90cdf4;margin:12px 0 32px;opacity:.85;}
  .spinner{width:36px;height:36px;border:4px solid rgba(255,255,255,.2);border-top-color:#c53030;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .msg{font-size:13px;color:#a0aec0;margin-bottom:20px;}
  a{display:inline-block;padding:12px 36px;background:#c53030;color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;box-shadow:0 4px 12px rgba(197,48,48,.4);}
  a:hover{background:#9b2c2c;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">صامد</div>
  <div class="logo-en">SAMED</div>
  <div class="sub">هيئة الهلال الأحمر السعودي — المدينة المنورة</div>
  <div class="spinner"></div>
  <div class="msg">جارٍ التحويل تلقائياً...</div>
  <a href="samed.html">🚑 دخول النظام مباشرةً</a>
</div>
</body>
</html>
